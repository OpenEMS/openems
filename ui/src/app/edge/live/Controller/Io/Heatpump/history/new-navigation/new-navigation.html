@if(edge !== null){
  <oe-navigation-view>
    <ion-buttons header class="ion-justify-content-center">
      <div #ref><ng-content select="[custom-pickdate]"></ng-content></div>
      @if (!ref.children.length) {
        <pickdate></pickdate>
      }
    </ion-buttons>
    <controller-io-heatpump-chart (setChartConfig)="setChartConfig($event)" [isOnlyChart]="true"
      [component]="component">
    </controller-io-heatpump-chart>
    @if (chartType === "line") {
      <oe-chart-legend [description]="STATES" [title]="'LEGEND_DESCRIPTION' | translate"></oe-chart-legend>
    }
  </oe-navigation-view>
}
