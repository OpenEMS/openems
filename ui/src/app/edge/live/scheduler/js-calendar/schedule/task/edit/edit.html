<oe-components-scheduler-edit-task
  [(payload)]="payload"
  [(allowedPeriods)]="allowedPeriods"
>
  <ion-item content>
    <ion-select
      [label]="'SCHEDULER_JS_CALENDAR.SELECTION_LABEL' | translate"
      [placeholder]="'SCHEDULER_JS_CALENDAR.SELECTION_PLACEHOLDER' | translate"
      [value]="payload()?.value?.controllerIds ?? null"
      (ionChange)="setValue($event)"
      [interfaceOptions]="{ cssClass: 'custom-ion-popover' }"
    >
      @for (option of controllerOptions; track option) {
        <ion-select-option [value]="option.value">
          {{ option.label }}
        </ion-select-option>
      }
    </ion-select>
  </ion-item>
</oe-components-scheduler-edit-task>
