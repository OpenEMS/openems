}

tasks.register('checkstyleAll') {
	group = 'OpenEMS-Test'
	description = 'Checkstyle all bundles'

	def edge = tasks.named('checkstyleEdge')
	def backend = tasks.named('checkstyleBackend')

	dependsOn edge
	dependsOn backend
