plugins {
	id 'base'
	id 'java'
	id 'com.github.node-gradle.node'
	id 'org.barfuin.gradle.jacocolog'
	id 'org.sonarqube'
}

repositories {
	mavenLocal()
	mavenCentral()
	gradlePluginPortal()
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(project.java_source as Integer)
	}
}

def isCI = providers.environmentVariable("CI").isPresent()

if (isCI) {
	println("CI environment detected - suppressing all compiler warnings")
}

/*
 * Setup multi-projects: 
 * - setup bnd tasks
 * - disable report generation
 * - setup parrallel execution
 */
subprojects {
	repositories {
		mavenCentral()
	}

	if (name ==~ /io.openems.(common|core|edge|oem|shared|wrapper).*/) {
		ext.isEdge = true
	}

	if (name ==~ /io.openems.(backend|common|core|oem|shared|wrapper).*/) {
		ext.isBackend = true
	}

	tasks.withType(JavaCompile).configureEach {
		options.release.set(project.java_target as Integer)
		options.encoding = 'UTF-8'
		options.fork = true
		options.incremental = true

		if (isCI) {
			options.compilerArgs += ["-Xlint:none", "-nowarn"]
			options.deprecation = false
		}
	}

	tasks.withType(Test).configureEach {
		maxParallelForks = Runtime.runtime.availableProcessors() * 0.66 as Integer
		reports {
			html.required = false
			junitXml.required = false
		}

		if (isCI) {
			testLogging {
				events = ["failed"]
				exceptionFormat = 'full'
				showExceptions = true
				showStackTraces = true
				showCauses = true
			}
			afterSuite { desc, result ->
				if (!desc.parent) {
					def shortName = path.takeRight(36)
					def padded = String.format("%36s", shortName)
					def icon = switch(result.resultType) {
						case org.gradle.api.tasks.testing.TestResult.ResultType.SUCCESS -> "✅"
						case org.gradle.api.tasks.testing.TestResult.ResultType.FAILURE -> "❌"
						case org.gradle.api.tasks.testing.TestResult.ResultType.SKIPPED -> "ℹ️"
						default -> ""
					}
					println "> [${padded}] Test summary: ${result.resultType} ${icon} " +
							"(${result.testCount} tests, " +
							"${result.successfulTestCount} passed, " +
							"${result.failedTestCount} failed, " +
							"${result.skippedTestCount} skipped)"
				}
			}
			afterTest { descriptor, result ->
				if (result.failedTestCount > 0) {
					println "\n${descriptor.className}.${descriptor.name} FAILED"
					result.exception?.printStackTrace(System.out)
				}
			}
		}
	}

	if (plugins.hasPlugin("biz.aQute.bnd")) {
		apply plugin: 'checkstyle'
		apply plugin: 'jacoco'

		jacocoTestReport {
			reports {
				xml.required = true
				csv.required = false
				html.required = false
			}
			// Exclude com.dalsemi.onewire
			afterEvaluate {
				classDirectories.setFrom(files(classDirectories.files.collect {
					fileTree(dir: it, excludes: ['**/com/dalsemi/onewire/**'])
				}))
			}
		}

		checkstyle {
			toolVersion = '11.1.0'
			configFile = file("${rootDir}/cnf/checkstyle.xml")
			maxWarnings = 0
			ignoreFailures = false
		}

		tasks.withType(Checkstyle).configureEach {
			reports {
				xml.required = false
				html.required = false
				sarif.required = false
			}
			minHeapSize = "512m"
			maxHeapSize = "2048m"
			// Exclude com.dalsemi.onewire
			exclude '**/com/dalsemi/onewire/*'
		}
	}
}

tasks.register('checkstyleEdge') {
	group = 'OpenEMS-Test'
	description = 'Checkstyle Edge bundles'

	subprojects.findAll { it.hasProperty('isEdge') }.each { proj ->
		if (proj.tasks.findByName('checkstyleMain')) {
			dependsOn(proj.checkstyleMain)
		}
		if (proj.tasks.findByName('checkstyleTest')) {
			dependsOn(proj.checkstyleTest)
		}
	}
}

