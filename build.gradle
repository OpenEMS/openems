/*
 * Javadoc
 */
tasks.register('buildAggregatedJavadocs', Javadoc) {
	description = 'Generate javadocs from all child projects as if it was a single project'
	group = 'Documentation'
	destinationDir = file("$buildDir/www/javadoc")
	title = "OpenEMS Javadoc"
	subprojects.each { proj ->
		proj.tasks.withType(Javadoc).each { javadocTask ->
			javadocTask.options.encoding = 'UTF-8'
			options.addStringOption('Xdoclint:none', '-quiet')
			source += javadocTask.source
			classpath += javadocTask.classpath
			excludes += javadocTask.excludes
			includes += javadocTask.includes
		}
	}
}

/*
 * Copies Bundle readme.adoc files to doc.
 */
tasks.register('copyBundleReadmes') {
	doLast {
		// define target files
		def targets = [
			controller: "edge/controller.d",
			scheduler: "edge/scheduler.d",
			nature: "edge/nature.d",
			bridge: "edge/bridge.d",
			deviceService: "edge/device_service.d",
			timedata: "edge/timedata.d",
			backendService: "backend/service.d"
		]

		// initialize target files and directories
		def basePath = projectDir.getPath() + "/doc/modules/ROOT/pages/"
		targets.each { name, target ->
			delete fileTree(dir: basePath + target, include: '**/*.adoc')
		}

		// Collect entries for all targets
		def targetEntries = [:]

		subprojects.each { proj ->
			// in each subproject (= bundle)...
			proj.file(".").listFiles().each { sourceFile ->
				// find the 'readme.adoc' file
				if(sourceFile.getName().equalsIgnoreCase("readme.adoc")) {
					def title // parse title from first line
					file(sourceFile).withReader { r ->
						title = r.readLine().replaceFirst(/^= /, "")
					}

					def bundle = sourceFile.getParentFile().getName()
					def targetKey = null

					if(bundle.startsWith("io.openems.edge.")) {
						def edgeBundle = bundle.substring("io.openems.edge.".length())
						if(edgeBundle.endsWith(".api")) {
							targetKey = 'nature'
						} else if(edgeBundle.startsWith("controller.")) {
							targetKey = 'controller'
						} else if(edgeBundle.startsWith("scheduler.")) {
							targetKey = 'scheduler'
						} else if(edgeBundle.startsWith("bridge.")) {
							targetKey = 'bridge'
						} else if(edgeBundle.startsWith("timedata.")) {
							targetKey = 'timedata'
						} else {
							targetKey = 'deviceService'
						}

					} else if(bundle.startsWith("io.openems.backend.")) {
						def backendBundle = bundle.substring("io.openems.backend.".length())
						if(backendBundle.startsWith("timedata.")) {
							targetKey = 'backendService'
						} else if(backendBundle.startsWith("metadata.")) {
							targetKey = 'backendService'
						} else {
							return // ignore
						}

					} else if(bundle.startsWith("io.openems.common.")) {
						def commonBundle = bundle.substring("io.openems.common.".length())
						if(commonBundle.startsWith("bridge.")) {
							return // ignore
						}

					} else if(bundle.startsWith("io.openems.wrapper")
							|| bundle.startsWith("io.openems.oem.")) {
						// ignore
						return
					}

					// could we exactly evaluate the bundle type and set the targetFile?
					if(targetKey == null) {
						throw new Exception("Bundle type is unknown for " + bundle)
					}

					def target = targets[targetKey]

					// copy the bundle readme file to "target" folder
					def readmeFile = bundle + ".adoc"
					copy {
						from (sourceFile.toPath())
						into (basePath + target)
						rename { fileName ->
							return readmeFile
						}
					}

					// collect entries for target
					if(!targetEntries[targetKey]) {
						targetEntries[targetKey] = []
					}

					targetEntries[targetKey].add([path: target + "/" + readmeFile, title: title])
				}
			}
		}

		// Sort and write entries for all targets
		targetEntries.each { targetKey, entries ->
			def target = targets[targetKey]
			// Sort xref entries alphabetically by title
			def nav = new File(basePath + target + "/_nav.adoc")
			nav.write("")
			entries.sort { a, b -> a.title.compareToIgnoreCase(b.title) }.each { entry ->
				nav.append("* xref:" + entry.path + "[" + entry.title + "]\n")
			}
		}
	}
}

/*
 * Build Antora docs
 */
tasks.register('buildAntoraDocs') {
	group = 'Documentation'
	dependsOn ":doc:buildAntoraDocs"
	dependsOn ":copyBundleReadmes"

	mustRunAfter ":copyBundleReadmes"

	def source = file("doc/build/www")
	def output = file("${buildDir}/www")

	doLast {
		output.deleteDir()
		copy {
			from source
			into output
		}
		source.deleteDir()

		println("Built ${output}!")
	}
}